<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Créditos</title>
</head>
<body>

<header>
  <h1>Sistema Básico de Créditos</h1>
   <link rel="stylesheet" href="simulador_completo.css">
</header>

<nav>
  <button onclick="mostrarSeccion('parametros')">Parámetros</button>
  <button onclick="mostrarSeccion('clientes')">Clientes</button>
  <button onclick="mostrarSeccion('credito')">Credito</button>
  <!-- <button onclick="mostrarSeccion('practica')">PRACTICA001</button> -->

</nav>

<!-- 2. Identifique en el HTML las etiquetas <section> y sus respectivos id.  -->
<section id="parametros">
  <h2>Configurar Parámetros</h2>

  <label>Tasa de interés:</label>
  <!-- Buscamos el input de la tasa y agregamos los atributos -->
  <input type="number" id="tasaInteres" min="10" max="20" value="15">
  <span>%</span>

  <br>
  <button onclick="guardarTasa()">Guardar tasa</button>

  <p id="mensajeTasa"></p>
</section>

<!-- 2. Identifique en el HTML las etiquetas <section> y sus respectivos id.  -->
<section id="clientes">
  <h2>Registro de Clientes</h2>

  <input type="text" id="cedula" placeholder="Cédula">
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="apellido" placeholder="Apellido">
  <input type="text" id="email" placeholder="email">
  <input type="text" id="contacto" placeholder="contacto">
  <input type="number" id="ingresos" placeholder="Ingresos mensuales">
  <input type="number" id="egresos" placeholder="Egresos mensuales">

  <br>

  <button onclick="guardarCliente()">Guardar cliente</button>
  <button onclick="limpiar()">Limpiar</button>

  <table>
    <thead>
      <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>E-mail</th>
        <th>Contacto</th>
        <th>Ingresos</th>
        <th>Egresos</th>
        <th>Actualizar</th>
        <th>Eliminar</th>
      </tr>
    </thead>
    <tbody id="tablaClientes">
      <!-- Las filas se generarán dinámicamente con JavaScript -->
    </tbody>
  </table>
</section>

<!-- 2. Identifique en el HTML las etiquetas <section> y sus respectivos id.  -->
  <section id="credito">
    <h2>Solicitar Crédito</h2>

    <input type="text" id="buscarCedulaCredito" placeholder="Ingrese la cedula a buscar">
    <button onclick="buscarClienteCredito()">Buscar cliente</button>

    <div id="datosClienteCredito" class="card"></div>

    <input type="number" id="montoCredito" placeholder="Monto (ej: 1000)">
    <input type="number" id="plazoCredito" placeholder="Plazo en años (ej: 2)">

    <br>

    <button onclick="calcularCredito()">Calcular crédito</button>

    <div id="resultadoCredito"></div>

    <button id="btnSolicitarCredito" onclick="solicitarCredito()" disabled>
      Solicitar crédito
    </button>
  </section>
